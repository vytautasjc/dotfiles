# Base settings
model = "gpt-5.5"
model_provider = "openai"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
model_reasoning_effort = "medium"
model_verbosity = "high"

# Enable network for API calls and package installation
[sandbox_workspace_write]
network_access = true

# Safe environment variables
[shell_environment_policy]
inherit = "core"
experimental_use_profile = true

[mcp_servers.diff-review]
command = "node"
args = ["/home/limadev/.vscode-server/extensions/jinqishen.diff-review-0.3.0/out/mcp-server.js"]

[mcp_servers.diff-review.tools.listDiffComments]
approval_mode = "approve"

[mcp_servers.diff-review.tools.replyToDiffComment]
approval_mode = "approve"

[mcp_servers.diff-review.tools.resolveDiffComment]
approval_mode = "approve"